name: Publish to PyPI

# Triggers on a strict semver-shaped tag push (e.g. v0.2.0). Tags like
# v0.2-rc1 or v1.0.0-dev are intentionally excluded so they don't
# auto-publish — push them to test the build process without releasing.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for PyPI Trusted Publishing (OIDC)
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and build tooling
        run: |
          python -m pip install --upgrade pip build
          pip install -e ".[all,dev]"

      - name: Verify tag matches package version
        # Catches the "tagged the wrong commit" mistake — e.g., the
        # tag is v0.2.0 but pyproject.toml or metacausal.__version__
        # still say 0.1.0. Both files are checked because they hold
        # the version independently (memory: feedback_version_two_places).
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          INIT_VERSION=$(python -c "import metacausal; print(metacausal.__version__)")

          echo "Tag:                        ${GITHUB_REF_NAME} (${TAG_VERSION})"
          echo "pyproject.toml version:     ${PYPROJECT_VERSION}"
          echo "metacausal.__version__:     ${INIT_VERSION}"

          if [ "${TAG_VERSION}" != "${PYPROJECT_VERSION}" ]; then
            echo "::error::Tag does not match pyproject.toml version"
            exit 1
          fi
          if [ "${TAG_VERSION}" != "${INIT_VERSION}" ]; then
            echo "::error::Tag does not match metacausal.__version__"
            exit 1
          fi

      - name: Run test suite (pre-flight)
        # Same suite CI runs on PRs. A failing test blocks the publish
        # before the build/upload step.
        run: pytest

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
